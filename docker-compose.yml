services:

  ##########################################
  # MySQL Database
  ##########################################

  mysql:
    image: mysql:8.4

    container_name: lms-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: library_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - lms-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  ##########################################
  # Flask Backend
  ##########################################

  backend:

    build:
      context: ./backend
    image: ahsanmustafa/flask-backend:latest

    container_name: lms-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: library_db

    expose:
      - "5000"

    ports:
      - "5000:5000"

    networks:
      - lms-network

  ##########################################
  # Frontend
  ##########################################

  frontend:

    build:
      context: ./frontend
    image: ahsanmustafa/flask-frontend:latest  

    container_name: lms-frontend

    restart: unless-stopped

    depends_on:
      - backend

    expose:
      - "80"

    networks:
      - lms-network

  ##########################################
  # Reverse Proxy
  ##########################################

  nginx:

    build:
      context: ./nginx

    container_name: lms-nginx

    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"

    networks:
      - lms-network

##########################################
# Network
##########################################

networks:

  lms-network:
    driver: bridge

##########################################
# Volume
##########################################

volumes:

  mysql_data:
