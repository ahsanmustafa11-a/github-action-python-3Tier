<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ahsan DevOps Engineer </title>

    <link rel="stylesheet"
          href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-book-open"></i>

        <h2>LMS</h2>

    </div>

    <ul>

        <li class="active">

            <i class="fa-solid fa-chart-line"></i>

            Dashboard

        </li>

        <li>

            <i class="fa-solid fa-book"></i>

            Books

        </li>

        <li>

            <i class="fa-solid fa-user-graduate"></i>

            Students

        </li>

        <li>

            <i class="fa-solid fa-book-open-reader"></i>

            Issue Book

        </li>

        <li>

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </li>

    </ul>

</div>


<div class="main">

<header>

<div>

<h1>Ahsan Mustafa</h1>

<p>Developer Library Management System</p>

</div>

<div class="profile">

<i class="fa-solid fa-circle-user"></i>

</div>

</header>



<section class="cards">

<div class="card">

<h3>Total Books</h3>

<h2 id="totalBooks">0</h2>

</div>

<div class="card">

<h3>Available</h3>

<h2 id="availableBooks">0</h2>

</div>

<div class="card">

<h3>Issued</h3>

<h2 id="issuedBooks">0</h2>

</div>

<div class="card">

<h3>Students</h3>

<h2 id="students">0</h2>

</div>

</section>



<section class="book-section">

<div class="section-header">

<h2>Books Management</h2>

</div>

<div class="book-form">

<input type="text"
       id="title"
       placeholder="Book Title">

<input type="text"
       id="author"
       placeholder="Author">

<input type="text"
       id="category"
       placeholder="Category">

<input type="text"
       id="isbn"
       placeholder="ISBN">

<button onclick="addBook()">

<i class="fa-solid fa-plus"></i>

Add Book

</button>

</div>

<div class="search">

<input type="text"
       id="search"
       placeholder="Search Book..."
       onkeyup="searchBook()">

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Title</th>

<th>Author</th>

<th>Category</th>

<th>ISBN</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="bookTable">

</tbody>

</table>

</section>

</div>

<script src="js/app.js"></script>

</body>

</html>
